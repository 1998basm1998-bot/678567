<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تأجير - محلات كريم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- واجهة تسجيل الدخول -->
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2>محلات كريم لتأجير العدد اليدوية</h2>
            <input type="password" id="password-input" placeholder="كلمة المرور">
            <button onclick="checkPassword()" class="btn-primary">دخول</button>
        </div>
    </div>

    <!-- واجهة التطبيق الرئيسية -->
    <div id="main-app" class="screen">
        <header>
            <h1>نظام تأجير كريم</h1>
        </header>

        <!-- المحتوى الرئيسي -->
        <main id="app-content">
            
            <!-- تبويبة المخزون -->
            <section id="tab-inventory" class="tab-content active">
                <div class="top-actions">
                    <button onclick="openModal('addItemModal')" class="btn-primary">إضافة مادة +</button>
                </div>
                <div class="inventory-selectors">
                    <button onclick="switchInventory(1)" id="btn-inv-1" class="active">المخزون 1</button>
                    <button onclick="switchInventory(2)" id="btn-inv-2">المخزون 2</button>
                </div>
                <div id="inventory-list" class="list-container">
                    <!-- سيتم إضافة المواد هنا عبر الجافاسكريبت -->
                </div>
            </section>

            <!-- تبويبة الزبائن -->
            <section id="tab-customers" class="tab-content">
                <div id="customers-main-view">
                    <div class="top-actions">
                        <button onclick="openModal('addCustomerModal')" class="btn-primary">إضافة زبون جديد +</button>
                    </div>
                    <div id="customers-list" class="list-container">
                        <!-- سيتم إضافة الزبائن هنا -->
                    </div>
                </div>

                <!-- واجهة تفاصيل الزبون -->
                <div id="customer-details-view" style="display: none;">
                    <button onclick="backToCustomers()" class="btn-secondary">رجوع</button>
                    <h2 id="detail-customer-name" style="margin-top: 10px;">اسم الزبون</h2>
                    <div class="balance-card">
                        <p>الباقي الكلي:</p>
                        <h3 id="detail-customer-balance">0 دينار عراقي</h3>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-success" onclick="openModal('paymentModal')">تسديد</button>
                        <button class="btn-primary" onclick="openRentModal()">بيع (تأجير)</button>
                    </div>
                    <h3 style="margin: 15px 0;">المعاملات</h3>
                    <div id="transactions-list" class="list-container">
                        <!-- المعاملات تظهر هنا -->
                    </div>
                </div>
            </section>

            <!-- تبويبة التنبيهات -->
            <section id="tab-alerts" class="tab-content">
                <h2 style="margin-bottom: 15px;">التنبيهات (متجاوزي المدة)</h2>
                <div id="alerts-list" class="list-container">
                    <!-- التنبيهات تظهر هنا -->
                </div>
            </section>

        </main>

        <!-- التبويبات السفلية -->
        <nav class="bottom-nav">
            <button onclick="switchTab('tab-inventory')" class="nav-btn active" id="nav-inventory">المخزون</button>
            <button onclick="switchTab('tab-customers')" class="nav-btn" id="nav-customers">الزبائن</button>
            <button onclick="switchTab('tab-alerts')" class="nav-btn" id="nav-alerts">التنبيهات</button>
        </nav>
    </div>

    <!-- ================= النوافذ المنبثقة (Modals) ================= -->

    <!-- نافذة إضافة مادة -->
    <div id="addItemModal" class="modal">
        <div class="modal-content">
            <h3>إضافة مادة للمخزون <span id="current-inv-label">1</span></h3>
            <input type="text" id="item-name" placeholder="اسم المادة">
            <input type="number" id="item-price" placeholder="سعر المادة (يومياً)">
            <input type="number" id="item-qty" placeholder="الكمية">
            <div class="modal-actions">
                <button onclick="saveItem()" class="btn-primary">حفظ</button>
                <button onclick="closeModal('addItemModal')" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة زبون -->
    <div id="addCustomerModal" class="modal">
        <div class="modal-content">
            <h3>إضافة زبون جديد</h3>
            <input type="text" id="cust-name" placeholder="اسم الزبون">
            <div class="input-group">
                <span class="country-code">+964</span>
                <input type="number" id="cust-phone" placeholder="77... أو 78..." style="margin-bottom: 0;">
            </div>
            <div class="modal-actions" style="margin-top: 15px;">
                <button onclick="saveCustomer()" class="btn-primary">حفظ</button>
                <button onclick="closeModal('addCustomerModal')" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة البيع (التأجير) -->
    <div id="rentModal" class="modal">
        <div class="modal-content modal-large">
            <h3>تأجير جديد</h3>
            
            <!-- الإضافة: اختيار المخزون داخل نافذة البيع -->
            <div class="inventory-selectors" style="margin-bottom: 15px; margin-top: 10px;">
                <button onclick="changeRentInventory(1)" id="btn-rent-inv-1" class="active">المخزون 1</button>
                <button onclick="changeRentInventory(2)" id="btn-rent-inv-2">المخزون 2</button>
            </div>

            <div id="rent-items-container">
                <!-- حقول اختيار المواد تضاف هنا ديناميكياً بناءً على المخزون -->
            </div>
            <button onclick="addRentItemRow()" class="btn-secondary" style="margin-bottom: 15px; width: 100%;">+ إضافة مادة أخرى</button>
            
            <input type="number" id="rent-days" placeholder="عدد أيام التأجير" oninput="calculateRentTotal()">
            
            <div class="totals-box">
                <p>سعر اليوم الكامل: <span id="rent-daily-total">0</span> د.ع</p>
                <p>المجموع الكلي للأيام: <span id="rent-grand-total">0</span> د.ع</p>
            </div>

            <input type="number" id="rent-paid" placeholder="المبلغ المدفوع (إن وجد)">
            
            <div class="modal-actions">
                <button onclick="saveRentalTransaction()" class="btn-primary">حفظ المعاملة</button>
                <button onclick="closeModal('rentModal')" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة التسديد -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h3>تسديد مبلغ</h3>
            <input type="number" id="payment-amount" placeholder="المبلغ المسدد">
            <div class="modal-actions">
                <button onclick="savePayment()" class="btn-primary">حفظ</button>
                <button onclick="closeModal('paymentModal')" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
